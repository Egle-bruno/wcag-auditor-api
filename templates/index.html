<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Auditor WCAG v1.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f8f9fa; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea { width: 100%; height: 180px; border: 2px solid #e0e0e0; border-radius: 8px; padding: 15px; font-family: monospace; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
        .error { border-left: 5px solid #ef4444; background: #fee2e2; padding: 15px; margin: 10px 0; border-radius: 4px; }
        #codigoCorregido { background: #1e293b; color: #f8fafc; padding: 15px; border-radius: 8px; white-space: pre-wrap; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔍 Auditor de Accesibilidad WCAG</h1>
        <p>Introduce tu código HTML para detectar errores críticos de accesibilidad.</p>
        <textarea id="htmlInput" placeholder="<html>...</html>"></textarea>
        <br><br>
        <button onclick="auditar()">Analizar Ahora</button>
    </div>

    <div id="resultado" class="card" style="display:none;">
        <h3>📊 Resultados del Análisis</h3>
        <div id="resumen"></div>
        <div id="listaErrores"></div>
        <h4>✨ Código Sugerido:</h4>
        <div id="codigoCorregido"></div>
        <button id="btnCopy" style="background:#059669; margin-top:10px;">Copiar Código Limpio</button>
    </div>

    <script>
        async function auditar() {
            const html = document.getElementById('htmlInput').value;
            const res = await fetch('/audit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ html_content: html })
            });
            const data = await res.json();
            
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('resumen').innerHTML = `<p><b>Errores encontrados:</b> ${data.resumen.total_errores} | <b>Tiempo:</b> ${data.resumen.tiempo}</p>`;
            document.getElementById('listaErrores').innerHTML = data.detalles.map(e => `<div class="error"><b>[${e.prioridad}]</b> ${e.error}</div>`).join('');
            
            const codeBox = document.getElementById('codigoCorregido');
            codeBox.innerText = data.codigo_corregido;
            codeBox.style.display = 'block';

            document.getElementById('btnCopy').onclick = () => {
                navigator.clipboard.writeText(data.codigo_corregido);
                alert("¡Código copiado al portapapeles!");
            };
        }
    </script>
</body>
</html>
